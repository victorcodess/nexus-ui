name: Registry Outputs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  registry-outputs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and validate registry outputs
        run: npm run registry:check
